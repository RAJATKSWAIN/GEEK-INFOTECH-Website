name: "🚀 GEEK INFOTECH WEBSITE | Production Deployment"

on:
  push:
    branches:
      - main
      - master

jobs:

  deploy:
    name: "Deploy Geek Infotech Website"
    runs-on: ubuntu-latest

    steps:

    # ======================================
    # 1️⃣ CHECKOUT REPOSITORY
    # ======================================
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4


    # ======================================
    # 2️⃣ PHP SYNTAX VALIDATION
    # ======================================
    - name: 🔍 PHP Syntax Check
      run: |
        echo "Scanning PHP files for syntax errors..."
        find . -type f -name "*.php" -exec php -l {} \;


    # ======================================
    # 3️⃣ SECURITY SCAN
    # ======================================
    - name: 🔐 Security Scan
      uses: gitleaks/gitleaks-action@v2


    # ======================================
    # 4️⃣ DEPLOY TO INFINITYFREE
    # ======================================
    - name: 📦 FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ${{ secrets.FTP_DIR }}
        exclude: |
          **/.git*
          **/.git*/**
          README.md
          .github/**


    # ======================================
    # 5️⃣ DEPLOYMENT SUMMARY
    # ======================================
    - name: 🏆 Deployment Success
      if: success()
      run: |
        echo "### 🚀 Geek Infotech Website Deployment Successful!" >> $GITHUB_STEP_SUMMARY
        echo "- **Organization:** Geek Infotech" >> $GITHUB_STEP_SUMMARY
        echo "- **Developed By:** TrinityWebEdge" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status:** ✅ Website Updated" >> $GITHUB_STEP_SUMMARY


    # ======================================
    # FAILURE ALERT
    # ======================================
    - name: ⚠️ Deployment Failure
      if: failure()
      run: |
        echo "❌ Deployment Failed. Check pipeline logs."
